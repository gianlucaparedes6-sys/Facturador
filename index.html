<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mini Facturador</title>

    <link rel="stylesheet" href="apariencia.css">

</head>

<body>

    <!-- MENU -->

    <div class="menu">

        <button onclick="mostrarSeccion('portada')">
            Portada
        </button>

        <button onclick="mostrarSeccion('clientes')">
            Clientes
        </button>

        <button onclick="mostrarSeccion('facturacion')">
            Facturación
        </button>

        <button onclick="mostrarSeccion('productos')">
            Productos
        </button>

    </div>


    <!-- CONTENEDOR -->

    <div class="contenedor">


        <!-- PORTADA -->

        <div id="portada" class="seccion">

            <div class="card">

                <h1>
                    Mini Sistema de Facturación
                </h1>

                <p>
                    Bienvenido al sistema
                </p>

            </div>

        </div>


        <!-- CLIENTES -->

        <!-- CLIENTES -->

<div id="clientes" class="seccion oculto">

    <div class="card">

        <h2>Clientes</h2>

        <!-- INPUT -->
        <!-- NOMBRE, CEDULA, TELEFONO, CORREO -->
        <input type="text" id="nombreCliente" placeholder="Nombre">

        <input type="text" id="cedulaCliente" placeholder="Cédula">

        <input type="text" id="telefonoCliente" placeholder="Teléfono">

        <input type="email" id="correoCliente" placeholder="Correo">
        <!-- BOTON -->

        <button onclick="guardarCliente()">Guardar Cliente</button>
        <button onclick="modificarCliente()"> Modificar Cliente</button>
        <button onclick="buscarCliente()">Buscar Cliente</button>

        <!-- TABLA -->

        <table>

            <thead>

                <tr>

                    <th>Nombre</th>
                    <th>Cédula</th>
                    <th>Telefono</th>
                    <th>Correo</th>
                    <th>Eliminar</th>


                </tr>

            </thead>

            <tbody id="tablaClientes">

            </tbody>

        </table>

    </div>

</div>


        <!-- FACTURACION -->

        <div id="facturacion" class="seccion oculto">

            <!-- TODO TU SISTEMA
                 DE FACTURACIÓN VA AQUÍ -->


            <!-- CLIENTE -->

            <div class="card">

                <h2>Datos del Cliente</h2>

                <div class="grid">

                    <div>
                        <label>Nombre</label>
                        <input type="text" id="cliente">
                    </div>

                    <div>
                        <label>Cédula / RUC</label>
                        <input type="text" id="cedula">
                    </div>

                    <div>
                        <label>Teléfono</label>
                        <input type="text" id="telefono">
                    </div>

                    <div>
                        <label>Correo</label>
                        <input type="email" id="correo">
                    </div>

                </div>

            </div>


            <!-- PRODUCTOS FACTURA -->

            <div class="card">

                <h2>Detalle de Productos</h2>

                <div class="grid">

                    <div>
                        <label>Producto</label>
                        <input type="text" id="producto">
                    </div>

                    <div>
                        <label>Cantidad</label>
                        <input type="number" id="cantidad" value="1">
                    </div>

                    <div>
                        <label>Precio</label>
                        <input type="number" id="precio">
                    </div>

                    <div class="boton">

                        <button onclick="agregarProducto()">
                            Agregar Producto
                        </button>

                    </div>

                </div>

                <table>

                    <thead>

                        <tr>

                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Total</th>
                            <th>Acción</th>

                        </tr>

                    </thead>

                    <tbody id="tablaProductos">

                    </tbody>

                </table>

            </div>


            <!-- TOTALES -->

            <div class="totales">

                <div class="box-total">

                    <h3>Totales</h3>

                    <div class="linea">

                        <span>Subtotal:</span>

                        <span id="subtotal">
                            $0.00
                        </span>

                    </div>

                    <div class="linea">

                        <span>IVA %</span>

                        <input
                        type="number"
                        id="iva"
                        value="15"
                        onkeyup="calcularTotales()"
                        onchange="calcularTotales()">

                    </div>

                    <div class="linea">

                        <span>IVA:</span>

                        <span id="valorIva">
                            $0.00
                        </span>

                    </div>

                    <div class="linea">

                        <strong>Total:</strong>

                        <strong id="total">
                            $0.00
                        </strong>

                    </div>

                </div>

            </div>

        </div>


        <!-- PRODUCTOS -->

        <div id="productos" class="seccion oculto">

            <div class="card">

                <h2>Productos</h2>

                <input type="text" placeholder="Producto">

                <input type="number" placeholder="Precio">

                <button>
                    Guardar Producto
                </button>

            </div>

        </div>

    </div>

    <script src="facturacion.js"></script>

</body>
